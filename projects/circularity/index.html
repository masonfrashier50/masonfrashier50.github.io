<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Mechanic Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h2 id="status">Status: Car Disassembled</h2>
        
        <div id="garage">
            <div id="car-chassis">
                <div id="slot-engine" class="slot">Engine Slot</div>
                <div id="slot-battery" class="slot">Battery Slot</div>
            </div>
            <div id="parts-bin">
                <button onclick="installPart('engine')">Install Engine</button>
                <button onclick="installPart('battery')">Install Battery</button>
                <button onclick="stripCar()" style="background: #e74c3c;">Strip Car</button>
            </div>
        </div>

        <div id="track" class="hidden">
            <div id="player-car">🚗</div>
        </div>

        <button id="mode-btn" onclick="toggleMode()">Test Drive</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
